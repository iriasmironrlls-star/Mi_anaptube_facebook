<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FB Snaptube Edition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #080f1a; color: white; text-align: center; padding: 30px; }
        .card { background: #1877f2; padding: 25px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); display: inline-block; width: 90%; max-width: 450px; }
        h1 { margin-bottom: 10px; font-size: 24px; }
        input { width: 85%; padding: 12px; border-radius: 10px; border: none; margin: 15px 0; font-size: 16px; }
        button { background: #ffffff; color: #1877f2; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { margin-top: 20px; font-style: italic; color: #adff2f; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔵 FB Snaptube Pro</h1>
        <p>Descarga Videos, Fotos y Música de Facebook</p>
        <form action="/descargar" method="post">
            <input type="text" name="url" placeholder="Pega el link de Facebook aquí..." required>
            <br>
            <button type="submit">DESCARGAR AHORA</button>
        </form>
        <div id="status">Esperando link...</div>
    </div>
</body>
</html>
